# GoReleaser configuration for tinycs-cli
# Docs: https://goreleaser.com
#
# Asset naming is intentionally STABLE (no version suffix) so the GitHub Action
# auto-submit workflow in student starters can curl
#   https://github.com/tinycs-cn/tinycs-cli/releases/latest/download/tinycs-linux-amd64
# directly. See tinycs-cli/docs/github-action/workflow-template.yml.

version: 2

project_name: tinycs

before:
  hooks:
    - go mod tidy

builds:
  - id: tinycs
    main: ./cmd/tinycs
    binary: tinycs
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/tinycs-cn/cli/internal/version.Version={{ .Version }}
      - -X github.com/tinycs-cn/cli/internal/version.Commit={{ .ShortCommit }}

# Raw binary uploads (no tar.gz) — keeps `curl ... -o tinycs && chmod +x`
# usage trivial. Windows variant gets `.exe` appended automatically by GoReleaser.
archives:
  - id: binaries
    formats: [binary]
    name_template: "tinycs-{{ .Os }}-{{ .Arch }}"

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot-{{ .ShortCommit }}"

release:
  draft: false
  prerelease: auto
  name_template: "v{{ .Version }}"
  extra_files:
    - glob: scripts/install.sh
  header: |
    ## tinycs-cli {{ .Tag }}

    **macOS / Linux:**
    ```bash
    curl -fsSL https://github.com/tinycs-cn/tinycs-cli/releases/latest/download/install.sh | sh
    ```

    **Windows (PowerShell):**
    ```powershell
    irm https://github.com/tinycs-cn/tinycs-cli/releases/latest/download/tinycs-windows-amd64.exe -OutFile tinycs.exe
    ```

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - "Merge pull request"
      - "Merge branch"
  groups:
    - title: Features
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: Bug fixes
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 1
    - title: Others
      order: 999
